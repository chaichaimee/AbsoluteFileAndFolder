description = """ஸ்மார்ட் வடிகட்டுதல், சமீபத்திய வரலாறு மற்றும் நிர்வாகியாக இயக்கும் வசதியுடன் கோப்புகள் மற்றும் கோப்புறைகளை உடனடியாக அணுகுவதற்கான சிறந்த அமைப்பாளர்.
விசைப்பலகை குறுக்குவழிகள்:
Windows+Backspace
ஒருமுறை தட்டினால் AbsoluteFloder திறக்கும்
இருமுறை தட்டினால் AbsoluteFile திறக்கும்"""